<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULTRA Gym Social</title>
  <div class="main-wrapper">

  <!-- CASELLA AI FIANCHI CON QUOTES IN INGLESE E ICONE PALESTRA -->
  <div id="gym-sidebar" class="sidebar-quote hidden">
    <div class="gym-art">🏋️‍♂️ ⚙️ 🏋️‍♀️</div>
    <h1>No pain, no gain.</h1>
    <p id="motivation-quote">NEVER GIVE UP!</p>
    <div class="gym-art">🔥 🦾 🏆</div>
  </div>

  <!-- CONTAINER APP PRINCIPALE -->
  <div class="container">

    <h2>🔥AviEverest</h2>

    <!-- LOGIN -->
    <div id="login">
      <div class="card">
        <input id="name" placeholder="Dein Name">
        <input id="code" placeholder="Access Code" type="password">
        <button  onclick="login()">Enter Gym</button>
      </div>
    </div>

    <!-- APP -->
    <div id="app" class="hidden">

      <div class="card topbar">
        <div>👤 <b id="user"></b></div>
        <div class="status" id="status">⚪ offline</div>
      </div>

      <div class="card">
        <input id="training" placeholder="Was trainierst du heute?">

        <select id="shower">
          <option>Dusche: Ja</option>
          <option>Dusche: Nein</option>
        </select>

        <select id="sauna">
          <option>Sauna: Ja</option>
          <option>Sauna: Nein</option>
        </select>

        <button  id="post"       onclick="post()">Post Workout</button>
      </div>

      <h3>🏋️‍♂️ Feed</h3>
      <div id="feed"></div>

      <h3>💬 Chat</h3>
      <div class="card">
        <input id="msg" placeholder="Nachricht">
        <button      id="send"      onclick="send()">Senden</button>
      </div>

      <div id="chat"></div>

      <script type="module" src="index.js">

        
      </script>
   
    <link rel="stylesheet" href="index.css">
    </div>

  </div>

</div>
